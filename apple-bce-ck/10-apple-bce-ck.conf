# Redirect apple-bce → apple_bce_ck (patched workqueue-deferred timestamp fix).
#
# - blacklist: prevents kernel autoload from picking stock apple-bce via modalias
#   (boot-time alias resolution); apple_bce_ck is the remaining match and loads.
# - install: catches explicit modprobe apple-bce calls (e.g. the suspend hook's
#   post phase, or manual load) and loads ck instead. Falls back to stock if ck
#   is absent -- so after a kernel upgrade you can SSH in and run
#   'sudo modprobe apple_bce' to get stock working until ck is rebuilt.
blacklist apple-bce
install apple-bce /sbin/modprobe apple_bce_ck || /sbin/modprobe --ignore-install apple-bce
